name: Build en publiceer naar Codeberg Pages

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Afhankelijkheden installeren
        run: npm ci

      - name: Site bouwen
        run: npm run build

      - name: Publiceren naar pages-branch
        run: |
          cd dist
          git init
          git config user.name "Forgejo Actions"
          git config user.email "actions@codeberg.org"
          git add -A
          git commit -m "Deploy: ${{ github.sha }}"
          git push --force \
            "https://oauth2:${{ secrets.GITHUB_TOKEN }}@codeberg.org/${{ github.repository }}.git" \
            HEAD:pages
